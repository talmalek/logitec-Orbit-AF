<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit AF Controller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #87CEEB;
    --cream: #F5E6D0;
    --wood: #8B5E3C;
    --wood-dark: #5C3A1E;
    --accent: #D4A44C;
    --green: #4CAF50;
    --red: #e74c3c;
    --metal: #A0A0A0;
    --metal-light: #D8D8D8;
    --metal-dark: #606060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 20px;
  }

  /* ── TV container (matches 2624×1632 image ratio) ── */
  .tv {
    position: relative;
    width: 850px;
    height: 529px;
    max-width: 95vw;
    max-height: 59vw;
    flex-shrink: 0;
  }

  .tv-img {
    position: absolute;
    display: block;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    z-index: 1;
  }

  /* ── Video positioned over the screen ── */
  .screen-overlay {
    position: absolute;
    top: 29.5%;
    left: 15.5%;
    width: 50%;
    height: 41%;
    overflow: hidden;
    border-radius: 8px;
    z-index: 2;
  }

  .screen-overlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #1a1a1a;
  }

  .screen-overlay .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 6px
    );
    pointer-events: none;
    z-index: 3;
  }

  .screen-overlay .glare {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 25%, rgba(255,255,255,.12) 0%, transparent 55%);
    pointer-events: none;
    z-index: 4;
  }

  .video-info {
    position: absolute;
    bottom: 6px;
    left: 8px;
    font-size: 10px;
    color: #0f0;
    font-family: 'Courier New', monospace;
    background: rgba(0,0,0,.55);
    padding: 2px 7px;
    border-radius: 3px;
    z-index: 5;
    opacity: 1;
    transition: opacity .6s;
  }
  .video-info.hidden { opacity: 0; }
  .screen-overlay:hover .video-info.hidden { opacity: 1; }

  /* ── Each control is independently positioned inside .tv ── */
  .tv-el {
    position: absolute;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .tv-el.disabled .dpad,
  .tv-el.disabled .speed-row { opacity: .3; pointer-events: none; }

  /* Camera selector (styled as a knob label) */
  .cam-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .ctrl-lbl {
    font-size: 7px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(220,200,170,.8);
    text-align: center;
  }
  .cam-wrap select {
    width: 90%;
    padding: 2px 3px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,.15);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(2px);
    color: #e8dcc8;
    font-size: 7px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    outline: none;
  }
  .cam-wrap select:focus { border-color: var(--accent); }

  /* D-Pad */
  .dpad-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .dpad {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: conic-gradient(from 45deg,
      #b0b0b0 0deg, #d0d0d0 45deg, #b0b0b0 90deg,
      #808080 135deg, #b0b0b0 180deg,
      #d0d0d0 225deg, #b0b0b0 270deg,
      #808080 315deg, #b0b0b0 360deg
    );
    box-shadow:
      0 3px 10px rgba(0,0,0,.4),
      0 1px 0 rgba(255,255,255,.2),
      inset 0 0 12px rgba(0,0,0,.15);
  }

  .dpad::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      linear-gradient(0deg, transparent 40%, rgba(0,0,0,.2) 40%, rgba(0,0,0,.2) 60%, transparent 60%),
      linear-gradient(90deg, transparent 40%, rgba(0,0,0,.2) 40%, rgba(0,0,0,.2) 60%, transparent 60%);
    z-index: 1;
    pointer-events: none;
  }

  .dpad-btn {
    position: absolute;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    transition: all .1s;
    -webkit-user-select: none;
    user-select: none;
    z-index: 2;
    padding: 0;
  }
  .dpad-btn:hover { color: #111; }
  .dpad-btn:active, .dpad-btn.active { transform: scale(.88); color: var(--wood-dark); }

  .dpad-btn[data-dir="up"]    { top: 1px; left: 50%; transform: translateX(-50%); width: 24px; height: 18px; font-size: 9px; }
  .dpad-btn[data-dir="down"]  { bottom: 1px; left: 50%; transform: translateX(-50%); width: 24px; height: 18px; font-size: 9px; }
  .dpad-btn[data-dir="left"]  { left: 1px; top: 50%; transform: translateY(-50%); width: 18px; height: 24px; font-size: 9px; }
  .dpad-btn[data-dir="right"] { right: 1px; top: 50%; transform: translateY(-50%); width: 18px; height: 24px; font-size: 9px; }
  .dpad-btn[data-dir="up"]:active, .dpad-btn[data-dir="up"].active { transform: translateX(-50%) scale(.88); }
  .dpad-btn[data-dir="down"]:active, .dpad-btn[data-dir="down"].active { transform: translateX(-50%) scale(.88); }
  .dpad-btn[data-dir="left"]:active, .dpad-btn[data-dir="left"].active { transform: translateY(-50%) scale(.88); }
  .dpad-btn[data-dir="right"]:active, .dpad-btn[data-dir="right"].active { transform: translateY(-50%) scale(.88); }

  .dpad-btn[data-dir="home"] {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, var(--metal-light), var(--metal));
    box-shadow: 0 2px 4px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.4);
    font-size: 10px;
  }
  .dpad-btn[data-dir="home"]:active, .dpad-btn[data-dir="home"].active {
    transform: translate(-50%, -50%) scale(.9);
    box-shadow: 0 1px 2px rgba(0,0,0,.3), inset 0 2px 3px rgba(0,0,0,.2);
  }

  /* Speed */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 3px;
    width: 90%;
    justify-content: center;
  }
  .speed-row input[type="range"] { width: 36px; accent-color: var(--accent); height: 2px; }
  .speed-row .spd-lbl { font-size: 5px; color: rgba(220,200,170,.6); font-weight: 600; }
  .speed-val {
    font-size: 7px; font-weight: 700;
    color: var(--accent);
    min-width: 10px; text-align: center;
  }

  /* Format selector */
  .fmt-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .fmt-wrap select {
    width: 90%;
    padding: 2px 3px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,.15);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(2px);
    color: #e8dcc8;
    font-size: 7px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    outline: none;
  }
  .fmt-wrap select:focus { border-color: var(--accent); }

  /* PTZ connection card */
  .ptz-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    width: 100%;
  }
  .ptz-card-row {
    display: flex;
    align-items: center;
    gap: 5px;
    justify-content: center;
  }
  .ptz-lbl { font-size: 7px; color: rgba(220,200,170,.8); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .toggle-track {
    position: relative;
    width: 28px;
    height: 14px;
    background: linear-gradient(to bottom, #555, #333);
    border-radius: 7px;
    cursor: pointer;
    transition: background .3s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.4);
  }
  .toggle-track.on { background: linear-gradient(to bottom, #3a7, var(--green)); }
  .toggle-thumb {
    position: absolute;
    top: 1.5px; left: 1.5px;
    width: 11px; height: 11px;
    background: radial-gradient(circle at 40% 35%, #fff, #ccc);
    border-radius: 50%;
    transition: transform .2s;
    box-shadow: 0 1px 2px rgba(0,0,0,.3);
  }
  .toggle-track.on .toggle-thumb { transform: translateX(14px); }

  .ptz-status-msg {
    font-size: 6px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-align: center;
    padding: 2px 5px;
    border-radius: 3px;
    max-width: 100%;
    line-height: 1.3;
  }
  .ptz-status-msg.ok   { color: var(--green); }
  .ptz-status-msg.warn { color: #ff9800; }
  .ptz-status-msg.idle { color: rgba(220,200,170,.45); }

  /* Settings button */
  .settings-btn {
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,.15);
    background: rgba(0,0,0,.3);
    color: rgba(220,200,170,.85);
    font-size: 7px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 3px;
    transition: background .2s, border-color .2s;
    outline: none;
  }
  .settings-btn:hover { background: rgba(255,255,255,.15); border-color: var(--accent); }
  .settings-btn .gear { font-size: 10px; }

  /* Disabled state */
  .tv-el.disabled .dpad,
  .tv-el.disabled .speed-row { opacity: .3; pointer-events: none; }

  /* ? shortcut button + popover */
  .kbd-wrap {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .kbd-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,.2);
    background: rgba(255,255,255,.35);
    color: rgba(0,0,0,.5);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .kbd-btn:hover { background: rgba(255,255,255,.6); }
  .kbd-popover {
    display: none;
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,20,10,.95);
    color: var(--cream);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    line-height: 2;
  }
  .kbd-popover.open { display: block; }
  .kbd-popover kbd {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
  }

  /* ── Settings drawer (below the TV) ── */
  .settings-drawer {
    margin-top: 20px;
    background: linear-gradient(145deg, #A97C50, #8B5E3C, #5C3A1E);
    border-radius: 16px;
    padding: 20px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.1);
    width: 700px;
    max-width: 90vw;
    display: none;
  }
  .settings-drawer.open { display: block; }

  .settings-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .settings-header h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--cream);
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
  }
  .settings-header button {
    font-size: 10px;
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,.2);
    background: var(--cream);
    color: #3a2a1a;
    cursor: pointer;
    font-weight: 600;
  }

  .setting-row { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-row label {
    font-size: 11px; color: var(--cream);
    display: flex; justify-content: space-between;
    text-shadow: 0 1px 2px rgba(0,0,0,.3);
  }
  .setting-row label .val { color: #fff; font-weight: 600; }
  .setting-row input[type="range"] { width: 100%; accent-color: var(--accent); }

  /* ── Audio spectrum analyzer ── */
  .audio-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
    opacity: .85;
  }

  /* ── Spectrum strip (below video frame, outside screen-overlay) ── */
  .spectrum-strip {
    position: absolute;
    z-index: 10;
    pointer-events: none;
    overflow: hidden;
    border-radius: 0 0 4px 4px;
  }

  /* ── Mic / Mute control ── */
  .mic-row {
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: center;
  }
  .mic-lbl { font-size: 7px; color: rgba(220,200,170,.85); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .mic-icon {
    font-size: 11px;
    cursor: pointer;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(to bottom, #555, #333);
    box-shadow: inset 0 1px 3px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.1);
    transition: background .3s;
    border: none;
    color: #bbb;
  }
  .mic-icon.muted { background: linear-gradient(to bottom, #a33, var(--red)); color: #fff; }
  .mic-icon.active { background: linear-gradient(to bottom, #3a7, var(--green)); color: #fff; }
  .mic-level {
    width: 24px; height: 5px;
    background: rgba(0,0,0,.4);
    border-radius: 3px;
    overflow: hidden;
  }
  .mic-level-fill {
    height: 100%;
    width: 0%;
    background: var(--green);
    border-radius: 3px;
    transition: width .08s;
  }

  .spec-toggle {
    font-size: 9px;
    cursor: pointer;
    width: 14px; height: 14px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: rgba(220,200,170,.7);
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .spec-toggle.off { background: rgba(0,0,0,.3); color: rgba(255,255,255,.25); border-color: rgba(255,255,255,.1); }
  .spec-toggle:hover { background: rgba(255,255,255,.25); }

  /* ── Banner & Toast ── */
    width: 100%; max-width: 850px; text-align: center;
    padding: 8px; font-size: 12px; display: none;
    border-radius: 8px; margin-bottom: 8px;
  }
  .usb-banner.warning { display: block; background: #ff9800; color: #000; }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(40,25,10,.9); color: var(--cream);
    padding: 10px 24px; border-radius: 10px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  #toast.show { opacity: 1; }

  /* ── Keyboard hint (below TV) — now hidden, replaced by popover ── */
  .kbd-hint { display: none; }
  kbd {
    background: rgba(255,255,255,.4);
    border: 1px solid rgba(0,0,0,.15);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
  }
</style>
</head>
<body>

<div class="usb-banner" id="usbBanner"></div>

<div class="tv">
  <img class="tv-img" id="el-tvimg" src="tv-bg.png" alt="TV" draggable="false" style="top:0%;left:-1%;width:102%;height:101.5%">

  <!-- Video overlay on the screen -->
  <div class="screen-overlay" id="el-video" style="top:27.5%;left:29.5%;width:34%;height:44.5%">
    <video id="videoEl" autoplay playsinline muted></video>
    <div class="glare"></div>
    <div class="video-info" id="videoOverlay">No camera</div>
  </div>

  <!-- Spectrum strip — sits just below the video frame -->
  <canvas class="spectrum-strip" id="spectrumCanvas" style="top:72%;left:29.5%;width:34%;height:4%"></canvas>

  <!-- Controls: all on the right panel -->
  <div class="tv-el" id="el-camera" data-label="Camera Dropdown" style="top:16.5%;left:63%;width:14%">
    <div class="cam-wrap">
      <span class="ctrl-lbl">Camera</span>
      <select id="cameraSelect" title="Select camera"><option value="">Loading…</option></select>
    </div>
  </div>

  <div class="tv-el" id="el-mic" data-label="Microphone" style="top:24%;left:63%;width:14%">
    <div class="mic-row">
      <span class="mic-lbl">Mic</span>
      <button class="mic-icon" id="micToggle" title="Click to enable mic · Double-click to stop">&#127908;</button>
      <div class="mic-level" title="Audio level"><div class="mic-level-fill" id="micLevel"></div></div>
      <button class="spec-toggle" id="specToggle" title="Toggle spectrum analyzer on video">&#9641;</button>
    </div>
  </div>

  <div class="tv-el" id="el-resolution" data-label="Resolution" style="top:30.5%;left:63%;width:14%">
    <div class="fmt-wrap">
      <span class="ctrl-lbl">Resolution</span>
      <select id="formatSelect" title="Select resolution and frame rate"><option>–</option></select>
    </div>
  </div>

  <div class="tv-el" id="el-ptz" data-label="PTZ Toggle" style="top:38.5%;left:63%;width:14%">
    <div class="ptz-card">
      <div class="ptz-card-row">
        <span class="ptz-lbl">Pan/Tilt</span>
        <div class="toggle-track" id="ptzToggle" title="Toggle pan/tilt server connection"><div class="toggle-thumb"></div></div>
      </div>
      <div class="ptz-status-msg idle" id="ptzStatusMsg">Off</div>
    </div>
  </div>

  <div class="tv-el" id="el-dpad" data-label="D-Pad" style="top:50%;left:63%;width:14%">
    <div class="dpad-wrap">
      <div class="dpad">
        <button class="dpad-btn" data-dir="up" title="Tilt Up">&#9650;</button>
        <button class="dpad-btn" data-dir="left" title="Pan Left">&#9664;</button>
        <button class="dpad-btn" data-dir="home" title="Reset to center">&#8962;</button>
        <button class="dpad-btn" data-dir="right" title="Pan Right">&#9654;</button>
        <button class="dpad-btn" data-dir="down" title="Tilt Down">&#9660;</button>
      </div>
    </div>
  </div>

  <div class="tv-el" id="el-speed" data-label="Speed Slider" style="top:65%;left:61.5%;width:17%">
    <div class="speed-row">
      <span class="spd-lbl">Slow</span>
      <input type="range" id="speedSlider" min="1" max="10" value="3" title="Pan/tilt speed">
      <span class="spd-lbl">Fast</span>
      <span class="speed-val" id="speedVal">3</span>
    </div>
  </div>

  <div class="tv-el" id="el-settings" data-label="Settings Button" style="top:72%;left:63%;width:14%">
    <button class="settings-btn" id="settingsBtn" title="Open camera image settings">
      <span class="gear">&#9881;</span> Settings
    </button>
  </div>
</div>

<div class="kbd-wrap">
  <div class="kbd-popover" id="kbdPopover">
    <kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd> Pan / Tilt<br>
    <kbd>H</kbd> Reset to center<br>
    <kbd>M</kbd> Mic mute toggle<br>
    <kbd>Ctrl</kbd>+<kbd>E</kbd> Position editor
  </div>
  <button class="kbd-btn" id="kbdBtn" title="Keyboard shortcuts">?</button>
</div>

<!-- Settings drawer -->
<div class="settings-drawer" id="settingsDrawer">
  <div class="settings-header">
    <h3>Camera Settings</h3>
    <button id="resetSettingsBtn">Reset Defaults</button>
  </div>
  <div id="settingsContainer">
    <p style="font-size:12px;color:var(--cream);opacity:.6">Enable Pan/Tilt to load settings…</p>
  </div>
</div>

<div id="toast"></div>

<script>
const PTZ_SERVER = 'http://localhost:9090';
const videoEl       = document.getElementById('videoEl');
const overlay       = document.getElementById('videoOverlay');
const camSelect     = document.getElementById('cameraSelect');
const usbBanner     = document.getElementById('usbBanner');
const ptzToggle     = document.getElementById('ptzToggle');
const ptzStatusMsg  = document.getElementById('ptzStatusMsg');
const controlsPanel = document.getElementById('el-dpad');
const speedSlider   = document.getElementById('speedSlider');
const speedValEl    = document.getElementById('speedVal');
const settingsContainer = document.getElementById('settingsContainer');
const formatSelect  = document.getElementById('formatSelect');
const settingsDrawer = document.getElementById('settingsDrawer');

/* Speed slider — show numeric value */
speedSlider.addEventListener('input', () => { speedValEl.textContent = speedSlider.value; });

let currentStream = null;
let ptzEnabled    = false;
let ptzConnected  = false;
let ptzPollTimer  = null;

function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

/* Video info overlay — show on update, fade after 3s */
let overlayFadeTimer = null;
function showOverlay(text) {

/* ─── Camera enumeration ────────────────────────────────────────── */
async function enumerateCameras() {
  let permStream = null;
  try { permStream = await navigator.mediaDevices.getUserMedia({ video: true }); } catch {}

  fetchServerFormats().catch(() => {});

  const devices = await navigator.mediaDevices.enumerateDevices();
  let vids = devices.filter(d => d.kind === 'videoinput' && d.deviceId);

  if (vids.length === 0 && permStream) {
    const track = permStream.getVideoTracks()[0];
    const s = track.getSettings();
    vids = [{ deviceId: s.deviceId || '__default__', label: track.label || 'Camera 1', kind: 'videoinput' }];
  } else if (vids.every(d => d.deviceId === '')) {
    const allVids = devices.filter(d => d.kind === 'videoinput');
    vids = allVids.map((d, i) => ({
      deviceId: `__idx_${i}__`,
      label: d.label || `Camera ${i + 1}`,
      kind: 'videoinput',
    }));
  }

  if (permStream) { permStream.getTracks().forEach(t => t.stop()); permStream = null; }

  camSelect.innerHTML = '';
  if (vids.length === 0) { camSelect.innerHTML = '<option value="">No cameras</option>'; return; }
  vids.forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = d.deviceId;
    opt.textContent = d.label || `Camera ${i + 1}`;
    camSelect.appendChild(opt);
  });
  const logi = vids.find(d => (d.label || '').toLowerCase().match(/046d:0994|orbit|logitech/));
  if (logi) camSelect.value = logi.deviceId;
  await startCamera(camSelect.value);

  const devicesRetry = await navigator.mediaDevices.enumerateDevices();
  const vidsRetry = devicesRetry.filter(d => d.kind === 'videoinput');
  if (vidsRetry.length > 0 && vidsRetry[0].label && vidsRetry[0].label !== camSelect.options[0]?.textContent) {
    const savedVal = camSelect.value;
    camSelect.innerHTML = '';
    vidsRetry.forEach((d, i) => {
      const opt = document.createElement('option');
      opt.value = d.deviceId || `__idx_${i}__`;
      opt.textContent = d.label || `Camera ${i + 1}`;
      camSelect.appendChild(opt);
    });
    if ([...camSelect.options].some(o => o.value === savedVal)) camSelect.value = savedVal;
  }
}

/* ─── Start camera ──────────────────────────────────────────────── */
let currentDeviceId = null;

async function startCamera(deviceId, w, h, fps) {
  if (!deviceId) return;

  if (currentStream && deviceId === currentDeviceId) {
    const track = currentStream.getVideoTracks()[0];
    try {
      const c = {};
      if (w && h) { c.width = { exact: w }; c.height = { exact: h }; }
      if (fps) c.frameRate = { ideal: fps };
      await track.applyConstraints(c);
      const s = track.getSettings();
      showOverlay(`${s.width}×${s.height} @ ${Math.round(s.frameRate)}fps`);
      return;
    } catch {}
  }

  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }

  const vc = {};
  if (deviceId && !deviceId.startsWith('__')) vc.deviceId = { exact: deviceId };
  if (w && h) { vc.width = { ideal: w }; vc.height = { ideal: h }; }
  else { vc.width = { ideal: 9999 }; vc.height = { ideal: 9999 }; }
  if (fps) vc.frameRate = { ideal: fps };

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: vc });
    currentStream = stream;
    currentDeviceId = deviceId;
    videoEl.srcObject = stream;
    const track = stream.getVideoTracks()[0];
    const s = track.getSettings();
    showOverlay(`${s.width}×${s.height} @ ${Math.round(s.frameRate)}fps`);
    await probeAndBuildFormats(track, s);
  } catch (err) {
    showOverlay('Camera error');
    toast('Failed: ' + err.message);
  }
}
camSelect.addEventListener('change', () => { currentDeviceId = null; startCamera(camSelect.value); });
navigator.mediaDevices.addEventListener('devicechange', enumerateCameras);

/* ─── Resolution & FPS selector ──────────────────────────────────── */
let serverFormats = {};

async function fetchServerFormats() {
  try {
    const res = await fetch(`${PTZ_SERVER}/api/formats`, { signal: AbortSignal.timeout(1500) });
    const data = await res.json();
    (data.cameras || []).forEach(cam => {
      serverFormats[cam.name.toLowerCase()] = cam.formats;
    });
  } catch {}
}

function matchServerFormats(label) {
  const lower = label.toLowerCase();
  let bestFmts = null, bestScore = 0;
  for (const [name, fmts] of Object.entries(serverFormats)) {
    let score = 0;
    if (lower === name) return fmts;
    if (lower.includes(name)) score = name.length;
    else if (name.includes(lower)) score = lower.length;
    else {
      name.split(/\s+/).filter(w => w.length > 3).forEach(w => { if (lower.includes(w)) score += w.length; });
    }
    if (score > bestScore) { bestScore = score; bestFmts = fmts; }
  }
  return bestFmts;
}

const PROBE_RESOLUTIONS = [
  [1920,1080],[1600,1200],[1552,1552],[1328,1760],[1760,1328],
  [1280,720],[1080,1920],[960,720],[800,600],[640,480],
  [352,288],[320,240],[176,144],[160,120]
];
const PROBE_FPS = [30,25,20,15,10,5];

let formatCache = {};

async function probeFormats(track) {
  const cap = track.getCapabilities ? track.getCapabilities() : null;
  const wMax = cap?.width?.max || 9999;
  const hMax = cap?.height?.max || 9999;
  const origSettings = track.getSettings();
  const formats = [];

  for (const [w, h] of PROBE_RESOLUTIONS) {
    if (w > wMax || h > hMax) continue;
    try {
      await track.applyConstraints({ width: { exact: w }, height: { exact: h }, frameRate: { ideal: 30 } });
      const s = track.getSettings();
      if (s.width === w && s.height === h) {
        const maxFps = Math.round(s.frameRate);
        PROBE_FPS.forEach(fps => { if (fps <= maxFps) formats.push([w, h, fps]); });
      }
    } catch {}
  }

  try { await track.applyConstraints({ width: { exact: origSettings.width }, height: { exact: origSettings.height }, frameRate: { ideal: origSettings.frameRate } }); } catch {}
  return formats;
}

async function probeAndBuildFormats(track, current) {
  const label = camSelect.selectedOptions[0]?.textContent || '';
  let formats = matchServerFormats(label);

  if (!formats || formats.length === 0) {
    const cacheKey = label || current.deviceId || 'default';
    if (formatCache[cacheKey]) {
      formats = formatCache[cacheKey];
    } else {
      formatSelect.innerHTML = '<option>Detecting…</option>';
      formats = await probeFormats(track);
      if (formats.length > 0) formatCache[cacheKey] = formats;
    }
  }

  buildFormatSelect(formats, current);
}

function buildFormatSelect(formats, current) {
  formatSelect.innerHTML = '';
  const curKey = `${current.width}x${current.height}@${Math.round(current.frameRate)}`;
  let hasCurrent = false;

  if (formats && formats.length > 0) {
    formats.forEach(([w, h, fps]) => {
      const opt = document.createElement('option');
      opt.value = `${w},${h},${fps}`;
      opt.textContent = `${w}×${h} @${fps}`;
      const key = `${w}x${h}@${fps}`;
      if (key === curKey) { opt.selected = true; hasCurrent = true; }
      formatSelect.appendChild(opt);
    });
  }

  if (!hasCurrent) {
    const opt = document.createElement('option');
    opt.value = `${current.width},${current.height},${Math.round(current.frameRate)}`;
    opt.textContent = `${current.width}×${current.height} @${Math.round(current.frameRate)}`;
    opt.selected = true;
    formatSelect.prepend(opt);
  }
}

formatSelect.addEventListener('change', async () => {
  const [w, h, fps] = formatSelect.value.split(',').map(Number);
  const track = currentStream?.getVideoTracks()[0];
  if (!track) return;

  try {
    await track.applyConstraints({ width: { exact: w }, height: { exact: h }, frameRate: { ideal: fps } });
    const s = track.getSettings();
    showOverlay(`${s.width}×${s.height} @ ${Math.round(s.frameRate)}fps`);
  } catch (err) {
    toast('Format not supported: ' + err.message);
  }
});

async function sendPTZ(pan, tilt) {
  if (!ptzConnected) return;
  try {
    const res = await fetch(`${PTZ_SERVER}/api/ptz`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pan, tilt }),
    });
    const data = await res.json();
    if (!data.ok) toast('PTZ error');
  } catch { toast('PTZ request failed'); }
}
async function sendReset() {
  if (!ptzConnected) return;
  try {
    const res = await fetch(`${PTZ_SERVER}/api/reset`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) toast('Reset to center'); else toast('Reset failed');
  } catch { toast('Reset request failed'); }
}

const dirMap = {
  up: () => sendPTZ(0, speed()), down: () => sendPTZ(0, -speed()),
  left: () => sendPTZ(-speed(), 0), right: () => sendPTZ(speed(), 0),
  home: () => sendReset(),
};
function speed() { return parseInt(speedSlider.value); }

document.querySelectorAll('.dpad-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  btn.addEventListener('mousedown', e => { e.preventDefault(); btn.classList.add('active'); });
  btn.addEventListener('mouseup', () => btn.classList.remove('active'));
  btn.addEventListener('mouseleave', () => btn.classList.remove('active'));
  btn.addEventListener('click', () => { if (dirMap[dir]) dirMap[dir](); });
  let hold = null;
  btn.addEventListener('mousedown', () => { if (dir === 'home') return; hold = setInterval(() => { if (dirMap[dir]) dirMap[dir](); }, 250); });
  const stop = () => { clearInterval(hold); hold = null; };
  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
});

const keyMap = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right', KeyH: 'home' };
const activeKeys = new Set();
let keyRepeat = null;
function processKeys() { activeKeys.forEach(d => { if (dirMap[d]) dirMap[d](); }); }
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'KeyM') { if (micActive) toggleMute(); else startAudio(); return; }
  const dir = keyMap[e.code]; if (!dir) return; e.preventDefault();
  const btn = document.querySelector(`.dpad-btn[data-dir="${dir}"]`); if (btn) btn.classList.add('active');
  if (!activeKeys.has(dir)) { activeKeys.add(dir); processKeys(); if (!keyRepeat && dir !== 'home') keyRepeat = setInterval(processKeys, 250); }
});
document.addEventListener('keyup', e => {
  const dir = keyMap[e.code]; if (!dir) return;
  const btn = document.querySelector(`.dpad-btn[data-dir="${dir}"]`); if (btn) btn.classList.remove('active');
  activeKeys.delete(dir);
  if (activeKeys.size === 0 && keyRepeat) { clearInterval(keyRepeat); keyRepeat = null; }
});

const SETTING_LABELS = {
  brightness: 'Brightness', contrast: 'Contrast', saturation: 'Saturation',
  sharpness: 'Sharpness',

async function loadSettings() {
  try {
    const res = await fetch(`${PTZ_SERVER}/api/settings`);
    const data = await res.json();
    buildSettingsUI(data.settings || []);
  } catch {
    settingsContainer.innerHTML = '<p style="font-size:12px;color:var(--cream);opacity:.6">Failed to load settings</p>';
  }

function buildSettingsUI(settings) {
  settingsContainer.innerHTML = '';
  if (settings.length === 0) {
    settingsContainer.innerHTML = '<p style="font-size:12px;color:var(--cream);opacity:.6">No adjustable settings</p>';
    return;
  }

  settings.forEach(s => {
    const row = document.createElement('div');
    row.className = 'setting-row';
    const label = document.createElement('label');
    const displayName = SETTING_LABELS[s.name] || s.name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    label.innerHTML = `<span>${displayName}</span><span class="val" id="sval-${s.name}">${s.current}</span>`;

    const input = document.createElement('input');
    input.type = 'range';
    input.min = s.min;
    input.max = s.max;
    input.value = s.current;

    let debounce = null;
    input.addEventListener('input', () => {
      document.getElementById(`sval-${s.name}`).textContent = input.value;
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        fetch(`${PTZ_SERVER}/api/setting`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: s.name, value: parseInt(input.value) }),
        }).catch(() => toast(`Failed to set ${displayName}`));
      }, 150);
    });

    row.appendChild(label);
    row.appendChild(input);
    settingsContainer.appendChild(row);
  });
}

/* ─── Microphone & Spectrum Analyzer ─────────────────────────────── */
const micToggle  = document.getElementById('micToggle');
const micLevelEl = document.getElementById('micLevel');
const specCanvas = document.getElementById('spectrumCanvas');
const specCtx    = specCanvas.getContext('2d');

let audioCtx     = null;
let audioStream  = null;
let analyser     = null;
let micSource    = null;
let micMuted     = false;
let micActive    = false;
let spectrumRAF  = null;

async function findMatchingAudioDevice() {
  const camLabel = (camSelect.selectedOptions[0]?.textContent || '').toLowerCase();
  const devices = await navigator.mediaDevices.enumerateDevices();
  const audioInputs = devices.filter(d => d.kind === 'audioinput' && d.deviceId);
  if (audioInputs.length === 0) return null;

  if (camLabel.match(/046d:0994|orbit|logitech/)) {
    const match = audioInputs.find(d => {
      const l = (d.label || '').toLowerCase();
      return l.includes('046d:0994') || l.includes('orbit') || (l.includes('usb audio') && !l.includes('headphone'));
    });
    if (match) return match.deviceId;
  }

  const words = camLabel.split(/[\s\-_()]+/).filter(w => w.length > 3);
  for (const dev of audioInputs) {
    const dl = (dev.label || '').toLowerCase();
    if (words.some(w => dl.includes(w))) return dev.deviceId;
  }

  return null;
}

async function startAudio() {
  try {
    const audioDeviceId = await findMatchingAudioDevice();
    const constraints = { audio: audioDeviceId ? { deviceId: { exact: audioDeviceId } } : true };
    audioStream = await navigator.mediaDevices.getUserMedia(constraints);

    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.8;
    micSource = audioCtx.createMediaStreamSource(audioStream);
    micSource.connect(analyser);

    micActive = true;
    micMuted = false;
    micToggle.classList.remove('muted');
    micToggle.classList.add('active');
    micToggle.innerHTML = '&#127908;';
    drawSpectrum();
  } catch (err) {
    toast('Mic error: ' + err.message);
  }
}

function stopAudio() {
  micActive = false;
  if (spectrumRAF) { cancelAnimationFrame(spectrumRAF); spectrumRAF = null; }
  if (micSource) { micSource.disconnect(); micSource = null; }
  if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
  analyser = null;
  micToggle.classList.remove('active', 'muted');
  micToggle.innerHTML = '&#127908;';
  micLevelEl.style.width = '0%';
  specCtx.clearRect(0, 0, specCanvas.width, specCanvas.height);
}

function toggleMute() {
  if (!audioStream) return;
  micMuted = !micMuted;
  audioStream.getAudioTracks().forEach(t => { t.enabled = !micMuted; });
  micToggle.classList.toggle('muted', micMuted);
  micToggle.classList.toggle('active', !micMuted);
  micToggle.innerHTML = micMuted ? '&#128263;' : '&#127908;';
  if (micMuted) {
    micLevelEl.style.width = '0%';
    specCtx.clearRect(0, 0, specCanvas.width, specCanvas.height);
  }
}

micToggle.addEventListener('click', () => {
  if (!micActive) startAudio();
  else if (micMuted) toggleMute();
  else toggleMute();
});
micToggle.addEventListener('dblclick', () => { if (micActive) stopAudio(); });

/* Spectrum analyzer toggle */
let spectrumEnabled = true;
const specToggleBtn = document.getElementById('specToggle');
specToggleBtn.addEventListener('click', () => {
  spectrumEnabled = !spectrumEnabled;
  specToggleBtn.classList.toggle('off', !spectrumEnabled);
  specToggleBtn.title = spectrumEnabled ? 'Hide spectrum analyzer' : 'Show spectrum analyzer';
  specCanvas.style.display = spectrumEnabled ? '' : 'none';
  if (!spectrumEnabled) {
    specCtx.clearRect(0, 0, specCanvas.width, specCanvas.height);
  }
});

function drawSpectrum() {
  if (!analyser || !micActive) return;
  spectrumRAF = requestAnimationFrame(drawSpectrum);

  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(data);

  const W = specCanvas.offsetWidth || specCanvas.width || 200;
  const H = specCanvas.offsetHeight || specCanvas.height || 24;
  if (specCanvas.width !== W) specCanvas.width = W;
  if (specCanvas.height !== H) specCanvas.height = H;

  specCtx.clearRect(0, 0, W, H);

  if (micMuted) {
    micLevelEl.style.width = '0%';
    return;
  }

  const barCount = Math.min(bufLen, 48);
  const barW = Math.max(1, (W / barCount) - 1);
  const gap = (W - barW * barCount) / (barCount + 1);

  let rms = 0;
  for (let i = 0; i < barCount; i++) {
    const v = data[i] / 255;
    rms += v * v;
    if (spectrumEnabled) {
      const barH = v * H;
      const x = gap + i * (barW + gap);
      const y = H - barH;

      const grad = specCtx.createLinearGradient(x, H, x, y);
      grad.addColorStop(0, 'rgba(76,175,80,0.9)');
      grad.addColorStop(0.5, 'rgba(212,164,76,0.9)');
      grad.addColorStop(1, 'rgba(231,76,60,0.9)');
      specCtx.fillStyle = grad;
      specCtx.fillRect(x, y, barW, barH);

      specCtx.fillStyle = 'rgba(255,255,255,0.25)';
      specCtx.fillRect(x, y, barW, 1);
    }
  }

  rms = Math.sqrt(rms / barCount);
  micLevelEl.style.width = Math.min(100, rms * 150).toFixed(0) + '%';
  micLevelEl.style.background = rms > 0.6 ? 'var(--red)' : rms > 0.3 ? 'var(--accent)' : 'var(--green)';
}

      #posEditor h4 { margin: 0 0 10px; font-size: 13px; color: #ffd; letter-spacing: 1px; }
      #posEditor select { width: 100%; padding: 5px; border-radius: 5px; border: 1px solid #555; background: #333; color: #eee; font-size: 11px; margin-bottom: 10px; }
      #posEditor .vals { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-bottom: 10px; font-size: 11px; }
      #posEditor .vals span { color: #aaa; }
      #posEditor .vals b { color: #fff; }
      #posEditor .arrows { display: grid; grid-template-columns: repeat(3, 36px); grid-template-rows: repeat(3, 30px); gap: 3px; justify-content: center; margin-bottom: 10px; }
      #posEditor .arrows button {
        border: 1px solid #555; background: #444; color: #eee; border-radius: 5px;
        cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
      }
      #posEditor .arrows button:hover { background: #666; }
      #posEditor .arrows button:active { background: #888; }
      #posEditor .zoom-row { display: flex; gap: 6px; align-items: center; justify-content: center; margin-bottom: 10px; }
      #posEditor .zoom-row button {
        border: 1px solid #555; background: #444; color: #eee; border-radius: 5px;
        cursor: pointer; font-size: 13px; width: 36px; height: 28px;
      }
      #posEditor .zoom-row button:hover { background: #666; }
      #posEditor .zoom-row span { font-size: 10px; color: #aaa; }
      #posEditor .step-row { display: flex; gap: 6px; align-items: center; justify-content: center; margin-bottom: 10px; font-size: 10px; color: #aaa; }
      #posEditor .step-row button { border: 1px solid #555; background: #444; color: #eee; border-radius: 4px; cursor: pointer; width: 28px; height: 22px; font-size: 10px; }
      #posEditor .save-btn {
        width: 100%; padding: 7px; border-radius: 6px; border: none;
        background: #4CAF50; color: #fff; font-weight: 700; font-size: 12px;
        cursor: pointer; letter-spacing: 1px;
      }
      #posEditor .save-btn:hover { background: #45a049; }
      .editor-highlight { outline: 2px dashed #ff0 !important; outline-offset: 2px; }
    </style>
    <h4>Position Editor</h4>
    <select id="editorSelect"></select>
    <div class="vals">
      <span>Top:</span><b id="edVal-top">–</b>
      <span>Left:</span><b id="edVal-left">–</b>
      <span>Width:</span><b id="edVal-width">–</b>
      <span>Height:</span><b id="edVal-height">–</b>
    </div>
    <div class="step-row">
      Step:
      <button id="stepDown">-</button>
      <b id="stepVal">0.5</b>%
      <button id="stepUp">+</button>
    </div>
    <div class="arrows">
      <div></div><button id="mv-up">&#9650;</button><div></div>
      <button id="mv-left">&#9664;</button><button id="mv-center" title="Show values" style="font-size:9px">&#9679;</button><button id="mv-right">&#9654;</button>
      <div></div><button id="mv-down">&#9660;</button><div></div>
    </div>
    <div class="zoom-row">
      <span>Size:</span>
      <button id="z-wm">W-</button><button id="z-wp">W+</button>
      <button id="z-hm">H-</button><button id="z-hp">H+</button>
    </div>
    <button class="save-btn" id="editorSave">Copy CSS to Clipboard</button>
  `;
  document.body.appendChild(panel);

  const edSel = document.getElementById('editorSelect');
  Object.entries(ELEMENTS).forEach(([id, {label}]) => {
    const opt = document.createElement('option');
    opt.value = id; opt.textContent = label;
    edSel.appendChild(opt);
  });

  function getEl() { return ELEMENTS[selectedId]?.el; }

  function readVals() {
    const el = getEl(); if (!el) return {};
    return {
      top: parseFloat(el.style.top) || 0,
      left: parseFloat(el.style.left) || 0,
      width: parseFloat(el.style.width) || 0,
      height: parseFloat(el.style.height) || 0,
    };
  }

  function showVals() {
    const v = readVals();
    document.getElementById('edVal-top').textContent = v.top.toFixed(1) + '%';
    document.getElementById('edVal-left').textContent = v.left.toFixed(1) + '%';
    document.getElementById('edVal-width').textContent = v.width ? v.width.toFixed(1) + '%' : 'auto';
    document.getElementById('edVal-height').textContent = v.height ? v.height.toFixed(1) + '%' : 'auto';
  }

  function highlight() {
    Object.values(ELEMENTS).forEach(({el}) => el?.classList.remove('editor-highlight'));
    getEl()?.classList.add('editor-highlight');
  }

  function move(prop, delta) {
    const el = getEl(); if (!el) return;
    const cur = parseFloat(el.style[prop]) || 0;
    el.style[prop] = (cur + delta).toFixed(1) + '%';
    showVals();
  }

  edSel.addEventListener('change', () => { selectedId = edSel.value; highlight(); showVals(); });
  document.getElementById('mv-up').addEventListener('click', () => move('top', -step));
  document.getElementById('mv-down').addEventListener('click', () => move('top', step));
  document.getElementById('mv-left').addEventListener('click', () => move('left', -step));
  document.getElementById('mv-right').addEventListener('click', () => move('left', step));
  document.getElementById('z-wp').addEventListener('click', () => move('width', step));
  document.getElementById('z-wm').addEventListener('click', () => move('width', -step));
  document.getElementById('z-hp').addEventListener('click', () => move('height', step));
  document.getElementById('z-hm').addEventListener('click', () => move('height', -step));
  document.getElementById('mv-center').addEventListener('click', showVals);

  document.getElementById('stepDown').addEventListener('click', () => {
    step = Math.max(0.1, step - 0.1);
    document.getElementById('stepVal').textContent = step.toFixed(1);
  });
  document.getElementById('stepUp').addEventListener('click', () => {
    step = Math.min(5, step + 0.1);
    document.getElementById('stepVal').textContent = step.toFixed(1);
  });

  document.getElementById('editorSave').addEventListener('click', () => {
    let css = '/* Saved element positions */\\n';
    Object.entries(ELEMENTS).forEach(([id, {el, label}]) => {
      if (!el) return;
      const s = el.style;
      css += `/* ${label} */\\n`;
      css += `#${id}, .${el.className.split(' ')[0]} {\\n`;
      if (s.top) css += `  top: ${s.top};\\n`;
      if (s.left) css += `  left: ${s.left};\\n`;
      if (s.width) css += `  width: ${s.width};\\n`;
      if (s.height) css += `  height: ${s.height};\\n`;
      css += `}\\n\\n`;
    });
    navigator.clipboard.writeText(css).then(() => {
      toast('CSS copied to clipboard — paste it to update index.html');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = css; ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:300px;z-index:99999;font-size:12px;font-family:monospace;background:#1a1a1a;color:#0f0;padding:12px;border-radius:8px';
      document.body.appendChild(ta);
      ta.select();
      toast('CSS shown — copy it manually');
      ta.addEventListener('blur', () => ta.remove());
    });
  });

  /* Ctrl+E to toggle editor */
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.code === 'KeyE') {
      e.preventDefault();
      editorOpen = !editorOpen;
      panel.classList.toggle('open', editorOpen);
      if (editorOpen) { highlight(); showVals(); }
      else { Object.values(ELEMENTS).forEach(({el}) => el?.classList.remove('editor-highlight')); }
      return;
    }

    if (!editorOpen) return;

    /* Arrow keys move selected element when editor is open */
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key) && !e.target.closest('#posEditor')) {
      e.preventDefault();
      e.stopPropagation();
      if (e.key === 'ArrowUp') move('top', -step);
      if (e.key === 'ArrowDown') move('top', step);
      if (e.key === 'ArrowLeft') move('left', -step);
      if (e.key === 'ArrowRight') move('left', step);
    }
  }, true);
})();
</script>
</body>
</html>
